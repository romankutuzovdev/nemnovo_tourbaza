# Публичный сайт nemnovo.by → Next.js на 127.0.0.1:3000
# Второй сайт на этом сервере — отдельный файл, другой server_name и другой порт upstream.
#
# sudo cp deploy/nginx/nemnovo-frontend.conf /etc/nginx/sites-available/nemnovo-frontend
# sudo ln -sf /etc/nginx/sites-available/nemnovo-frontend /etc/nginx/sites-enabled/
# После DNS: sudo certbot --nginx -d nemnovo.by -d www.nemnovo.by

server {
    listen 80;
    listen [::]:80;
    server_name nemnovo.by www.nemnovo.by 91.149.179.14;

    client_max_body_size 200M;

    # Django admin и collectstatic (/static/admin/…); без этого /admin обрабатывает Next.js
    location /admin/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # collectstatic и загрузки с диска проекта (без Gunicorn/Next)
    location /static/ {
        alias /opt/nemnovo_tourbaza/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /opt/nemnovo_tourbaza/backend/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API напрямую в Django: иначе Next.js даёт 308 без слэша, Django — 301 со слэшем → бесконечные редиректы
    location /api/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
