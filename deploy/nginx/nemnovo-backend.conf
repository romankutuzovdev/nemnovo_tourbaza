# Внутренний бэкенд: только localhost:8005 (не торчит наружу).
# Next.js проксирует /api и /media на http://127.0.0.1:8005
#
# sudo cp deploy/nginx/nemnovo-backend.conf /etc/nginx/sites-available/nemnovo-backend
# sudo ln -sf /etc/nginx/sites-available/nemnovo-backend /etc/nginx/sites-enabled/

upstream nemnovo_gunicorn {
    server 127.0.0.1:8000;
}

server {
    listen 127.0.0.1:8005;
    server_name _;

    client_max_body_size 200M;

    location /static/ {
        alias /opt/nemnovo_tourbaza/backend/staticfiles/;
    }

    location /media/ {
        alias /opt/nemnovo_tourbaza/backend/media/;
    }

    location / {
        proxy_pass http://nemnovo_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
