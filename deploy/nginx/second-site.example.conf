# Пример второго сайта на том же сервере (другой домен, другой порт приложения).
# Скопируйте и переименуйте, замените example.com и порт 3001 на свои значения.
#
# sudo cp second-site.example.conf /etc/nginx/sites-available/other-site
# sudo ln -sf /etc/nginx/sites-available/other-site /etc/nginx/sites-enabled/
# sudo certbot --nginx -d example.com -d www.example.com

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
